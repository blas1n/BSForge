# Cartoon Story Template (카툰썰 스타일)
#
# Warm colors, bounce animations, playful transitions.
# Best for: 썰 풀기, 이야기 전달, 캐릭터 중심 콘텐츠

name: cartoon_story
extends: korean_shorts_standard
description: 카툰썰 스타일 - 따뜻한 색상, 바운스 애니메이션, 재미있는 전환

layout:
  headline:
    enabled: true
    headline_animation: bounce
    line1:
      color: "#FF8C00"  # Dark orange
    background_enabled: true
    background_color: "#2D1B4E"  # Deep purple
    background_opacity: 0.9

theme:
  accent_color: "#FF8C00"
  secondary_color: "#FFF8DC"  # Cornsilk
  font_family: "Pretendard"
  headline_font_size_line1: 100
  headline_font_size_line2: 72
  subtitle_font_size: 90
  headline_bg_color: "#2D1B4E"
  headline_bg_opacity: 0.9
  highlight_color: "#FFD700"  # Gold
  text_color: "#FFFFFF"
  outline_color: "#1A0A2E"

subtitle:
  text_animation: bounce
  karaoke_enabled: true
  highlight_color: "#FFD700"

visual_effects:
  camera_movement: ken_burns
  camera_movement_options:
    - ken_burns
    - pan_left
    - pan_right
  randomize_camera: true
  transition_type: zoom
  transition_duration: 0.2
  segment_duration: 2.5
  brightness: 0.05
  contrast: 1.1
  saturation: 1.3
  warmth: 0.15
