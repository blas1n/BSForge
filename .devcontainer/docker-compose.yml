services:
  # Development container
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TZ: ${TZ:-Asia/Seoul}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    user: vscode
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
      - claude-code-bashhistory:/commandhistory
      - ~/.claude:/home/vscode/.claude:cached
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - ENVIRONMENT=development
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    stdin_open: true
    tty: true
    command: >
      sh -c "zsh && sudo /usr/local/bin/init-firewall.sh"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${EXTERNAL_BACKEND_PORT:-8000}:8000"
    networks:
      - bsforge-network

  # PostgreSQL Database with pgvector + pg_search (BM25) extension
  postgres:
    image: paradedb/paradedb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: bsforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: >
      postgres -c shared_preload_libraries=pg_search
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bsforge-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bsforge-network

  # Wan 2.2 Text-to-Video Service
  # Generates short video clips from text prompts
  # NOTE: Mac GPU not supported in Docker; falls back to CPU (slow)
  wan:
    build:
      context: ..
      dockerfile: .devcontainer/wan.Dockerfile
    restart: unless-stopped
    environment:
      - WAN_DEVICE=auto
      - HF_HOME=/root/.cache/huggingface
      - WAN_MODEL_ID=Wan-AI/Wan2.2-T2V-1.3B
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7861/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    ports:
      - "${EXTERNAL_WAN_PORT:-7861}:7861"
    networks:
      - bsforge-network

volumes:
  claude-code-bashhistory:
  postgres-data:
  redis-data:
  huggingface-cache:


networks:
  bsforge-network:
    driver: bridge
